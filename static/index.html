<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CineBot — Your Movie Companion</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0f;
      --surface:   #17171b;
      --border:    #2a2a32;
      --accent:    #e8c96d;
      --accent-dim:#a8893d;
      --text:      #ede8e0;
      --muted:     #6b6878;
      --user-bg:   #1f1f28;
      --bot-bg:    #1a1a22;
      --radius:    14px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    /* ── Layout ── */
    .shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 780px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 28px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .brand-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.55rem;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .brand-tag {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #reset-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      padding: 6px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    #reset-btn:hover { border-color: var(--accent-dim); color: var(--accent); }

    /* ── Chat window ── */
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 28px 28px 8px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    #chat-window::-webkit-scrollbar { width: 4px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Messages ── */
    .msg {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.25s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg.bot  .avatar { background: var(--accent); color: #0d0d0f; }
    .msg.user .avatar { background: var(--user-bg); border: 1px solid var(--border); }

    .bubble {
      max-width: 75%;
      padding: 14px 18px;
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: 0.92rem;
    }
    .msg.bot  .bubble { background: var(--bot-bg);  border: 1px solid var(--border); border-top-left-radius: 4px; }
    .msg.user .bubble { background: var(--user-bg); border: 1px solid var(--border); border-top-right-radius: 4px; }

    .bubble strong { color: var(--accent); font-weight: 500; }
    .bubble em { color: var(--muted); font-style: italic; }

    /* ── Typing indicator ── */
    .typing-dots {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 6px 2px;
    }
    .typing-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input bar ── */
    .input-bar {
      padding: 16px 28px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 18px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 300;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
      min-height: 50px;
      max-height: 140px;
      overflow-y: auto;
    }
    #user-input::placeholder { color: var(--muted); }
    #user-input:focus { border-color: var(--accent-dim); }

    #send-btn {
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: var(--radius);
      width: 50px;
      cursor: pointer;
      font-size: 1.1rem;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    #send-btn:hover   { background: #f0d47a; }
    #send-btn:active  { transform: scale(0.95); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }

    /* ── Welcome card ── */
    .welcome {
      margin: auto;
      text-align: center;
      padding: 40px 20px;
      animation: fadeUp 0.4s ease both;
    }
    .welcome .icon { font-size: 2.8rem; margin-bottom: 16px; }
    .welcome h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .welcome p { color: var(--muted); font-size: 0.9rem; max-width: 340px; line-height: 1.6; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }
    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      padding: 7px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .chip:hover { border-color: var(--accent-dim); color: var(--accent); }
  </style>
</head>
<body>
<div class="shell">

  <header>
    <div class="brand">
      <span class="brand-name">🎬 CineBot</span>
      <span class="brand-tag">Your movie companion</span>
    </div>
    <button id="reset-btn">New chat</button>
  </header>

  <div id="chat-window">
    <div class="welcome" id="welcome-card">
      <div class="icon">🍿</div>
      <h2>What are we watching?</h2>
      <p>Tell me how you're feeling and I'll find the perfect movie for you — across any streaming platform.</p>
      <div class="chips">
        <button class="chip" onclick="sendChip(this)">I want something funny</button>
        <button class="chip" onclick="sendChip(this)">Something scary tonight</button>
        <button class="chip" onclick="sendChip(this)">I'm in the mood for a classic</button>
        <button class="chip" onclick="sendChip(this)">Show me something underrated</button>
      </div>
    </div>
  </div>

  <div class="input-bar">
    <textarea id="user-input" placeholder="Tell me what you're in the mood for…" rows="1"></textarea>
    <button id="send-btn" title="Send">➤</button>
  </div>

</div>

<script>
  let history = [];

  const chatWindow = document.getElementById("chat-window");
  const userInput  = document.getElementById("user-input");
  const sendBtn    = document.getElementById("send-btn");
  const welcomeCard = document.getElementById("welcome-card");

  // Auto-resize textarea
  userInput.addEventListener("input", () => {
    userInput.style.height = "auto";
    userInput.style.height = Math.min(userInput.scrollHeight, 140) + "px";
  });

  userInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); }
  });

  sendBtn.addEventListener("click", handleSend);

  document.getElementById("reset-btn").addEventListener("click", () => {
    history = [];
    chatWindow.innerHTML = "";
    chatWindow.appendChild(welcomeCard);
    welcomeCard.style.display = "";
  });

  function sendChip(el) {
    userInput.value = el.textContent;
    handleSend();
  }

  function handleSend() {
    const text = userInput.value.trim();
    if (!text) return;
    userInput.value = "";
    userInput.style.height = "auto";

    if (welcomeCard.parentElement) welcomeCard.style.display = "none";

    appendMessage("user", text);
    sendBtn.disabled = true;

    const typingEl = appendTyping();

    fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, history })
    })
    .then(r => r.json())
    .then(data => {
      typingEl.remove();
      if (data.error) {
        appendMessage("bot", "⚠️ " + data.error);
      } else {
        history.push({ role: "user",      content: text });
        history.push({ role: "assistant", content: data.reply });
        appendMessage("bot", data.reply);
      }
    })
    .catch(() => {
      typingEl.remove();
      appendMessage("bot", "⚠️ Something went wrong. Please try again.");
    })
    .finally(() => { sendBtn.disabled = false; });
  }

  function appendMessage(role, text) {
    const msg = document.createElement("div");
    msg.className = `msg ${role === "user" ? "user" : "bot"}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "🧑" : "🎬";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = formatText(text);

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatWindow.appendChild(msg);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return msg;
  }

  function appendTyping() {
    const msg = document.createElement("div");
    msg.className = "msg bot";
    msg.innerHTML = `
      <div class="avatar">🎬</div>
      <div class="bubble">
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>`;
    chatWindow.appendChild(msg);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return msg;
  }

  // Lightweight markdown: **bold** and newlines
  function formatText(text) {
    return text
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
      .replace(/\*(.*?)\*/g, "<em>$1</em>")
      .replace(/\n/g, "<br>");
  }
</script>
</body>
</html>
